name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: ${{ matrix.os }} / rust-1.97.0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26-intel
          - macos-26
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Remove build host paths from release binary
        shell: bash
        run: |
          sysroot="$(rustc --print sysroot)"
          printf 'RUSTFLAGS=--remap-path-prefix=%s=/rustc/1.97.0 --remap-path-scope=object\n' "$sysroot" >> "$GITHUB_ENV"
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build Release Binary
        run: cargo build --release --locked
