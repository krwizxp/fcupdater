name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / rust-stable
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: artifacts/fcupdater-linux-x64.tar.gz
          - os: windows-latest
            artifact_path: target/release/fcupdater-windows-x64.exe

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release --locked

      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -C target/release --transform='s|^fcupdater$|fcupdater-linux-x64|' -czf artifacts/fcupdater-linux-x64.tar.gz fcupdater

      - name: Rename Windows artifact file
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Move-Item target\release\fcupdater.exe target\release\fcupdater-windows-x64.exe -Force

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ matrix.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
