name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: ${{ matrix.os }} / rust-stable
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: artifacts/fcupdater-linux-x64.tar.gz
          - os: windows-latest
            artifact_path: target/release/fcupdater-windows-x64.exe
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Build Release Binary
        run: cargo build --release --locked
      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -C target/release --transform='s|^fcupdater$|fcupdater-linux-x64|' -czf artifacts/fcupdater-linux-x64.tar.gz fcupdater
      - name: Rename Windows artifact file
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Move-Item target\release\fcupdater.exe target\release\fcupdater-windows-x64.exe -Force
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ matrix.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
