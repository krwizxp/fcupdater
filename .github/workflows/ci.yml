name: CI
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: ${{ matrix.os }} / rust-1.97.1
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: artifacts/fcupdater-linux-x64.tar
            binary_name: fcupdater-linux-x64
            source_path: target/release/fcupdater
          - os: macos-26-intel
            artifact_path: artifacts/fcupdater-macos-x64.tar
            binary_name: fcupdater-macos-x64
            source_path: target/release/fcupdater
          - os: macos-26
            artifact_path: artifacts/fcupdater-macos-arm64.tar
            binary_name: fcupdater-macos-arm64
            source_path: target/release/fcupdater
          - os: windows-latest
            artifact_path: target/release/fcupdater-windows-x64.exe
            binary_name: fcupdater-windows-x64
            source_path: target/release/fcupdater.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.1
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update
      - name: Install Linux libcurl headers
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Build Release Binary
        run: cargo build --release --locked
      - name: Prepare binary artifact with Rust
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        run: cargo run --locked --example package_artifact -- "${{ matrix.source_path }}" "${{ matrix.artifact_path }}" "${{ matrix.binary_name }}"
      - name: Upload Binary Artifact
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
