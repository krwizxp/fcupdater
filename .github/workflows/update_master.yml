name: Update Master Excel

on:
  workflow_dispatch:
    inputs:
      master_path:
        description: Master workbook path in the repository
        required: true
        default: fuel_cost_chungcheong.xlsx
        type: string
      sources_prefix:
        description: Source file prefix
        required: true
        default: 현재 판매가격(주유소)
        type: string
      skip_download:
        description: Skip Opinet auto-download and use existing source files only
        required: true
        default: false
        type: boolean
      no_change_log:
        description: Do not update the 변경내역 sheet
        required: true
        default: false
        type: boolean
      fast_save:
        description: Skip saved-file verification for faster completion
        required: true
        default: false
        type: boolean
      artifact_name:
        description: Output .xlsx filename prefix for the uploaded artifact
        required: true
        default: fcupdater-result
        type: string

permissions:
  contents: read

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        id: toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.cachekey }}-
            ${{ runner.os }}-cargo-

      - name: Prefer runner WebDrivers
        shell: pwsh
        run: |
          $chromeDriver = Get-Command chromedriver -ErrorAction SilentlyContinue
          $edgeDriver = Get-Command msedgedriver -ErrorAction SilentlyContinue
          if ($chromeDriver) {
            Remove-Item chromedriver\chromedriver.exe -Force -ErrorAction SilentlyContinue
          }
          if ($edgeDriver) {
            Remove-Item edgedriver\msedgedriver.exe -Force -ErrorAction SilentlyContinue
          }
          if (-not $chromeDriver -and -not $edgeDriver) {
            Write-Warning "Runner PATH WebDrivers not found. Repository drivers will be used."
          }

      - name: Show browser and driver versions
        shell: pwsh
        run: |
          $chrome = Join-Path $env:ProgramFiles "Google\Chrome\Application\chrome.exe"
          $edge = Join-Path ${env:ProgramFiles(x86)} "Microsoft\Edge\Application\msedge.exe"
          if (Test-Path $chrome) { & $chrome --version }
          if (Test-Path $edge) { & $edge --version }
          if (Get-Command chromedriver -ErrorAction SilentlyContinue) { chromedriver --version }
          if (Get-Command msedgedriver -ErrorAction SilentlyContinue) { msedgedriver --version }

      - name: Build release binary
        run: cargo build --release --all-features

      - name: Run updater
        id: run_updater
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactStem = "${{ inputs.artifact_name }}"
          if ([string]::IsNullOrWhiteSpace($artifactStem)) {
            $artifactStem = "fcupdater-result"
          }
          $artifactStem = $artifactStem.Trim()
          $artifactStem = $artifactStem -replace '[\\/:*?"<>|]', '-'

          New-Item -ItemType Directory -Force artifacts | Out-Null
          $outputPath = Join-Path $PWD ("artifacts\{0}.xlsx" -f $artifactStem)

          $args = @(
            "--master", "${{ inputs.master_path }}",
            "--sources-dir", ".",
            "--sources-prefix", "${{ inputs.sources_prefix }}",
            "--output", $outputPath
          )

          if ("${{ inputs.skip_download }}" -eq "true") {
            $args += "--skip-download"
          }
          if ("${{ inputs.no_change_log }}" -eq "true") {
            $args += "--no-change-log"
          }
          if ("${{ inputs.fast_save }}" -eq "true") {
            $args += "--fast-save"
          }

          & .\target\release\fcupdater.exe @args

          "artifact_path=$outputPath" >> $env:GITHUB_OUTPUT

      - name: Upload result artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.run_updater.outputs.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
