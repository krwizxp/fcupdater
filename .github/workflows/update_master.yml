name: Update Master Excel
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run updater
        id: run_updater
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/fcupdater
          artifact_dir="$PWD/artifacts"
          mkdir -p "$artifact_dir"
          artifact_path="$artifact_dir/fcupdater-result.xlsx"
          cp fuel_cost_chungcheong.xlsx "$artifact_path"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
      - name: Upload result artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fcupdater-result
          path: ${{ steps.run_updater.outputs.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
