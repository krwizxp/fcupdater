name: Update Master Excel
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.1
      - name: Install native dependencies
        run: sudo apt-get update
      - name: Install libcurl headers
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Run updater
        run: cargo run --release --locked
      - name: Prepare result artifact with Rust
        run: cargo run --locked --example package_artifact -- fuel_cost_chungcheong.xlsx artifacts/fcupdater-result.xlsx fcupdater-result.xlsx
      - name: Upload result artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fcupdater-result
          path: artifacts/fcupdater-result.xlsx
          if-no-files-found: error
          retention-days: 14
